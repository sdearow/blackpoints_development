# Configurazione centralizzata del sistema Black Point Roma.
# Tutti i parametri numerici, le soglie e i pesi del modello vivono qui.
# Gli script della pipeline (src/s00..s06) leggono questo file tramite
# src.config.carica_config().

# ---------------------------------------------------------------------------
# Periodo di analisi
# ---------------------------------------------------------------------------
# Filtri di selezione degli incidenti
# ---------------------------------------------------------------------------
filtri:
  # Solo incidenti con questo flag di qualita' geocodifica.
  # Valori: "alta", "media", "bassa" oppure null per nessun filtro.
  flag_qualita: "alta"
  # Confine spaziale: solo incidenti dentro il Comune di Roma.
  # Usa il convex hull della rete TomTom come proxy del confine comunale.
  # Se il file non esiste, usa il bounding box sotto come fallback.
  confine_da_rete: true
  # Bounding box di fallback (UTM 33N / EPSG:32633):
  bbox_utm:
    x_min: 270000
    x_max: 330000
    y_min: 4610000
    y_max: 4660000

# ---------------------------------------------------------------------------
# Periodo di analisi
# ---------------------------------------------------------------------------
# Quando i dati post-2022 saranno ri-geolocalizzati e agganciati alla rete
# si potra' restringere il periodo principale (es. 2017-2021).
periodo_analisi:
  anno_inizio: null
  anno_fine: null
  # Annualita' estese usate per analisi di sensibilita'.
  anno_inizio_esteso: 2010
  anno_fine_esteso: 2024

# ---------------------------------------------------------------------------
# Sistemi di riferimento
# ---------------------------------------------------------------------------
crs:
  # CRS metrico usato per tutti i calcoli geometrici (distanze, buffer).
  metrico: "EPSG:32633"   # UTM zona 33N
  # CRS geografico usato per la visualizzazione finale.
  visualizzazione: "EPSG:4326"  # WGS84
  # CRS originale dei file Incidenti_*.csv (Gauss-Boaga Italia zona 2).
  dato_incidenti: "EPSG:3004"

# ---------------------------------------------------------------------------
# Percorsi dei dati (relativi alla radice del repo)
# ---------------------------------------------------------------------------
paths:
  raw:
    # Directory che contiene i CSV degli incidenti. Tutti i file che
    # rispettano il glob vengono caricati, etichettati e uniti.
    # La deduplica avviene su id_incidente con priorita' definita nel loader
    # (i file piu' recenti/ri-geolocalizzati hanno priorita' piu' alta).
    incidenti_dir: "data/raw/incidenti"
    incidenti_glob: "Incidenti_*.csv"
    rete_tomtom: "data/raw/rete_tomtom.gpkg"
    # Grafo PGTU 2026 pubblicato dal Comune di Roma (GeoJSON in EPSG:4326).
    # Contiene classifica funzionale (S/IQ/IZ/Q), grande viabilita' e
    # trasporto pubblico locale, che in s01_preparazione_rete vengono
    # joinati spazialmente sugli archi TomTom.
    rete_pgtu: "data/raw/2a.PGTU_Grafo_2026.geojson"
    semafori: "data/raw/semafori.gpkg"
    # Strade extraurbane del Comune di Roma -> categoria SPF "EXTRAURBANA".
    strade_extraurbane_cdr: "data/raw/Strade_Extraurbane_CdR.geojson"
    # Strade gestite da altri enti (autostrade, ANAS, ecc.) -> escluse dalla SPF.
    strade_extraurbane_altri_enti: "data/raw/Strade_Extraurbane_Altri_Enti.geojson"
    # Censimento ISTAT 2021 (WP0/T0.1 - base del modulo Equita').
    # Tracciato colonne documentato in TRACCIATO_FILE_REGIONALI.xlsx.
    censimento_sezioni: "data/raw/censimento/Sezioni_ISTAT.gpkg"
    censimento_indicatori: "data/raw/censimento/Indicatori_ISTAT_Roma.xlsx"
    # Database progetti/interventi (WP0/T0.2) - registro in `interventi`.
    progetti_dir: "data/raw/progetti"
  interim:
    incidenti_clean: "data/interim/incidenti_clean.gpkg"
    censimento_prep: "data/interim/censimento_prep.gpkg"
    interventi_prep: "data/interim/interventi_prep.gpkg"
    rete_tomtom_prep: "data/interim/rete_tomtom_prep.gpkg"
    semafori_prep: "data/interim/semafori_prep.gpkg"
    intersezioni: "data/interim/intersezioni.gpkg"
    segmenti: "data/interim/segmenti.gpkg"
    incidenti_matched: "data/interim/incidenti_matched.gpkg"
  processed:
    spf_models: "data/processed/spf_models.pkl"
    eb_results: "data/processed/eb_results.parquet"
    priorita_finale: "data/processed/priorita_finale.gpkg"
    nkde: "data/processed/nkde.gpkg"
    equita: "data/processed/equita.gpkg"
    equita_indici: "data/processed/equita_indici.json"
    scenari: "data/processed/scenari.parquet"
    scenari_indici: "data/processed/scenari_indici.json"
    valutazioni: "data/processed/valutazioni.parquet"

# ---------------------------------------------------------------------------
# Fase 1 - Matching spaziale incidenti <-> rete
# ---------------------------------------------------------------------------
matching:
  # Raggio del buffer attorno ai nodi-intersezione (metri).
  # Entro questo raggio un incidente viene assegnato all'intersezione
  # invece che al segmento piu' vicino.
  raggio_intersezione: 25
  # Tolleranza (metri) per considerare due endpoint di archi distinti
  # come lo stesso nodo durante l'estrazione delle intersezioni da TomTom.
  tolleranza_nodo: 1.5
  # Distanza massima oltre la quale un incidente viene assegnato per pura
  # vicinanza geometrica al segmento piu' vicino (metri).
  soglia_snap_geometrica: 30
  # Distanza massima entro cui si tenta il match toponomastico (metri).
  soglia_snap_toponomastica: 100
  # Se true, filtra le false intersezioni con tre criteri:
  # 1) nodi a grado 3-4 con <=1 toponimo distinto (carreggiate separate)
  # 2) nodi a grado 3-4 con FRC uniforme e <=2 toponimi (biforcazioni)
  # 3) cluster di prossimita': nodi vicini con toponimi sovrapposti vengono
  #    fusi nel nodo a grado piu' alto.
  filtra_falsi_incroci: true
  # Raggio (metri) per il clustering di prossimita' delle intersezioni.
  # Nodi entro questa distanza con almeno un toponimo in comune vengono fusi.
  raggio_cluster_intersezioni: 30
  # Raggio (metri) del buffer attorno a ciascun nodo-intersezione usato
  # per raccogliere i toponimi degli archi TomTom limitrofi. Permette di
  # catturare il nome della piazza/largo anche quando i suoi archi non
  # convergono esattamente al nodo (es. perimetro di una piazza).
  raggio_toponimi_intersezione: 20
  # Variazione massima del TGM tra archetti consecutivi per appartenere
  # allo stesso segmento omogeneo.
  soglia_variazione_tgm_segmento: 0.30
  # Lunghezze min/max per i segmenti omogenei (metri).
  lunghezza_min_segmento: 100
  lunghezza_max_segmento: 2000
  # Distanza massima entro cui un semaforo viene associato a un nodo
  # come "intersezione semaforizzata" (metri).
  raggio_associazione_semaforo: 20
  # Distanza massima (metri, CRS metrico) entro cui il midpoint di un arco
  # TomTom viene associato a un arco del grafo PGTU 2026 per ereditarne la
  # classifica funzionale, il flag di grande viabilita' e il flag TPL.
  # Oltre questa soglia l'arco TomTom resta senza classificazione PGTU
  # (tipicamente strade locali non riportate nel grafo PGTU).
  raggio_associazione_pgtu: 15

# ---------------------------------------------------------------------------
# Fase 2 - Safety Performance Functions
# ---------------------------------------------------------------------------
spf:
  modello_segmenti: "NB2"     # binomiale negativa
  modello_intersezioni: "NB2"
  covariate_segmenti_base: ["log_TGM", "log_L"]
  covariate_segmenti_estese: ["log_TGM", "log_L", "V85", "IQR_norm"]
  covariate_intersezioni_base: ["log_flusso_entrante"]
  covariate_intersezioni_estese: ["log_flusso_entrante", "n_bracci"]
  # Numero minimo di siti per categoria sotto cui si accorpano le categorie.
  min_siti_per_categoria: 50
  # Anni da usare per il conteggio incidenti nella SPF.
  # null = tutti gli anni disponibili.
  anni_incidenti: [2018, 2019, 2020, 2021]

# ---------------------------------------------------------------------------
# Fase 3 - Empirical Bayes ed EPDO
# ---------------------------------------------------------------------------
eb:
  # Eventuali parametri di calcolo EB (placeholder per estensioni future).
  intervallo_confidenza: 0.95

epdo:
  # Pesi EPDO per la prioritizzazione (Hauer 1997, AASHTO).
  # Scelti per il ranking EB: rapporti moderati che evitano che un singolo
  # mortale casuale domini la classifica.
  # NB: i dati incidenti non distinguono feriti gravi/lievi, quindi si usa
  # un'unica categoria "feriti".
  pesi:
    mortale: 12
    feriti: 3
    solo_danni: 1
  # Costi sociali unitari MEF/ISTAT (euro, valori 2022) per il calcolo
  # del costo sociale separato (non usati per la prioritizzazione EPDO).
  costi_sociali_eur:
    mortale: 1500000
    feriti: 48300     # blend 15% gravi (220K) + 85% lievi (18K)
    solo_danni: 9000

# ---------------------------------------------------------------------------
# Fase 4 - Indice composito di priorita'
# ---------------------------------------------------------------------------
indice_composito:
  pesi:
    # Default: l'ICP coincide con la componente A (Eccesso EB-EPDO).
    # Le altre componenti (severita', vulnerabilita', rischio velocita')
    # restano disponibili e si possono pesare interattivamente nella tab
    # "Sensitivita' pesi" della dashboard per analisi what-if.
    eccesso_eb: 1.00
    severita: 0.00
    vulnerabilita: 0.00
    rischio_velocita: 0.00
  # Percentili usati per la normalizzazione robusta delle componenti.
  percentile_min: 1
  percentile_max: 99
  # Metodo di normalizzazione: A usa la P1-P99 lineare (continua),
  # B/C/D usano sempre la zero-inflated (zero -> 0, positivi -> [1,100])
  # perche' nei rapporti severita'/vulnerabilita' lo zero ha significato
  # sostantivo. La scelta e' codificata in assembla_priorita.

classificazione:
  # Soglie percentili per le 5 fasce di priorita' (Task 4.2).
  # < 20 monitoraggio, 20-40 bassa, 40-60 media, 60-80 alta, > 80 altissima.
  soglie_percentili: [20, 40, 60, 80]

# ---------------------------------------------------------------------------
# Censimento ISTAT (s0c) - base socio-demografica del modulo Equita'
# ---------------------------------------------------------------------------
censimento:
  # Codice PROCOM del comune (Roma Capitale). Il file indicatori e'
  # regionale (R12 Lazio) e va filtrato.
  pro_com: 58091

# ---------------------------------------------------------------------------
# Database interventi/progetti (s0d) - dotazione del modulo Equita'
# ---------------------------------------------------------------------------
interventi:
  # Data segnaposto finche' le date reali non vengono confermate nel CSV
  # di override (possono essere anche future per i progetti non attuati).
  data_placeholder: "2025-01-01"
  # CSV di override: id_intervento, data_attivazione [, fase].
  # Compilare partendo dal template reports/interventi_da_datare.csv.
  date_override: "data/raw/progetti/date_interventi.csv"
  # Raggio d'influenza (metri) per le geometrie puntuali; per aree e
  # linee conta l'impronta (raggio 0).
  raggio_influenza_default_m:
    velox: 500
    strada_scolastica: 300
    ponte_ciclopedonale: 150
    intervento_puntuale: 150
    ztl_varco: 150
    default_punti: 150
  # Normalizzazione della fase (matching case-insensitive sul valore
  # grezzo; tutto il resto -> da_definire). "aprovato" e' un typo presente
  # nel dato sorgente.
  mappa_fase:
    realizzato: realizzato
    approvato: pianificato
    aprovato: pianificato
    aggiunto: pianificato
    "progettazione in corso": in_corso
  # Registro delle sorgenti: database in divenire, si estende da qui
  # senza toccare il codice. Campi opzionali: layer, campo_nome,
  # campo_fase, campo_municipio.
  sorgenti:
    - {file: "Velox.gpkg", layer: "velox_12_2025", tipo: "velox",
       campo_nome: "NOME", campo_fase: "FATT", campo_municipio: "MUN"}
    - {file: "Isole_Ambientali.gpkg", tipo: "isola_ambientale",
       campo_nome: "IDnome"}
    - {file: "Strade_Scolastiche.gpkg", tipo: "strada_scolastica",
       campo_nome: "scuola", campo_fase: "SAL", campo_municipio: "municipio"}
    - {file: "Aree_Pedonali.gpkg", tipo: "area_pedonale", campo_nome: "Name"}
    - {file: "Ciclabilita_Rete.gpkg", tipo: "ciclabile",
       campo_nome: "Nome", campo_fase: "Stato"}
    - {file: "Ciclabilita_GRAB.gpkg", tipo: "ciclabile_grab",
       campo_nome: "NOME", campo_fase: "Stato"}
    - {file: "Ciclabilita_Ponti_Ciclopedonali.gpkg",
       tipo: "ponte_ciclopedonale", campo_nome: "Name"}
    - {file: "Interventi_Puntuali.gpkg", tipo: "intervento_puntuale",
       campo_nome: "Nome"}
    - {file: "Interventi_Lineari.gpkg", tipo: "intervento_lineare",
       campo_nome: "Nome"}
    - {file: "Interventi.gpkg", tipo: "intervento_area",
       campo_nome: "indirizzo"}
    - {file: "ZTL_Varchi.gpkg", tipo: "ztl_varco",
       campo_nome: "Descriz", campo_fase: "Stato"}
    - {file: "ZTL_Perimetri.gpkg", tipo: "ztl_perimetro",
       campo_nome: "Descrizion"}
    - {file: "Ambito_Balduina.gpkg", tipo: "ambito_progetto", campo_nome: "Nome"}
    - {file: "Ambito_Colli_Aniene.gpkg", tipo: "ambito_progetto", campo_nome: "Nome"}
    - {file: "Ambito_Torre_Spaccata.gpkg", tipo: "ambito_progetto", campo_nome: "Nome"}
    - {file: "Ambito_Trastevere.gpkg", tipo: "ambito_progetto", campo_nome: "Nome"}

# ---------------------------------------------------------------------------
# Modulo A del PSS - High Injury Network e hotspot NKDE (s07)
# ---------------------------------------------------------------------------
hin:
  # Quota di KSI (morti + feriti) che la HIN deve coprire.
  soglia_copertura: 0.70
  # Se true, stabilizza la conta KSI con la stima EB (KSI * EB_i/O_i):
  # ranking piu' robusto agli eventi rari.
  usa_eb: true
  # Misura di gravita' per il ranking: "ksi" (morti+feriti) o "epdo".
  metrica: "ksi"

nkde:
  # Lunghezza dei lixel in cui vengono spezzati i segmenti (metri).
  lunghezza_lixel_m: 20
  # Bandwidth del kernel quartico 1D (metri, lungo la linea).
  bandwidth_m: 200
  # Peso di ciascun incidente: "conteggio" (=1) o "epdo" (pesi epdo.pesi).
  peso: "epdo"
  # Se true, gli incidenti abbinati alle intersezioni vengono riagganciati
  # al segmento piu' vicino (la massa dominante degli incidenti e' agli
  # incroci e altrimenti sparirebbe dalla densita').
  includi_incidenti_intersezione: true
  raggio_snap_intersezioni_m: 50
  # Se true, salva solo i lixel con densita' > 0 (riduce molto l'output).
  salva_solo_positivi: true

# ---------------------------------------------------------------------------
# Modulo B del PSS - Equita' distributiva (s08, cuore del paper)
# ---------------------------------------------------------------------------
equita:
  # Pesi del composite index di vulnerabilita' sociale (schema principale).
  # NB: reddito non disponibile a scala di sezione -> istruzione e
  # occupazione come proxy socio-economiche (limite dichiarato).
  pesi_vulnerabilita:
    perc_bambini: 0.20
    perc_anziani: 0.20
    perc_stranieri: 0.15
    perc_istruzione_bassa: 0.25
    perc_non_occupati: 0.20
  # Schemi alternativi per l'analisi di sensibilita' (tabella nel paper).
  schemi_sensibilita:
    equi:
      perc_bambini: 0.2
      perc_anziani: 0.2
      perc_stranieri: 0.2
      perc_istruzione_bassa: 0.2
      perc_non_occupati: 0.2
    focus_eta:
      perc_bambini: 0.35
      perc_anziani: 0.35
      perc_stranieri: 0.10
      perc_istruzione_bassa: 0.10
      perc_non_occupati: 0.10
    focus_deprivazione:
      perc_bambini: 0.10
      perc_anziani: 0.10
      perc_stranieri: 0.15
      perc_istruzione_bassa: 0.35
      perc_non_occupati: 0.30
  # Combinazione bisogno = f(vulnerabilita', rischio):
  # "geometrica" = sqrt(v*r) (entrambi necessari), "pesata" = media pesata.
  metodo_bisogno: "geometrica"
  peso_rischio: 0.5
  # Tipologie considerate nella dotazione (null = tutte). La scelta resta
  # esplorabile in dashboard filtrando per tipo.
  tipi_dotazione: null
  # Fasi considerate nella dotazione (null = tutte). ATTENZIONE: finche'
  # e' null la dotazione fotografa il database progetti (realizzato +
  # pianificato + scenario), non il costruito. Quando le fasi saranno
  # consolidate, impostare ad es. ["realizzato"] o
  # ["realizzato", "in_corso"].
  fasi_dotazione: null
  # LISA bivariata: vicini KNN e soglia di significativita'.
  lisa_k_vicini: 8
  lisa_p_max: 0.05

# ---------------------------------------------------------------------------
# Modulo C del PSS - Ottimizzazione MCLP rischio + equita' (s09)
# ---------------------------------------------------------------------------
ottimizzazione:
  # Numero di interventi da collocare (p dell'MCLP).
  budget_default: 20
  # Raggio di copertura candidato -> punto di domanda (metri).
  raggio_copertura_m: 500
  # Candidati = unione di due insiemi (limite computazionale dichiarato):
  # - rischio: siti con eccesso EB positivo, primi N per excess_EPDO;
  # - equita': siti nelle equity priority zones, primi M per EB_i
  #   (senza questi le aree vulnerabili senza storico incidenti
  #   sarebbero irraggiungibili anche a peso equita' = 1).
  n_candidati_rischio: 1500
  n_candidati_equita: 1500
  # Punti della frontiera di Pareto pre-calcolata (w = 0, 0.1, ..., 1).
  n_punti_frontiera: 11
  # "greedy" (veloce, garanzia 1-1/e, quasi-ottimo su istanze spaziali)
  # oppure "esatto" (ILP CBC con timeout, per istanze ridotte).
  metodo: "greedy"
  timeout_s: 120

# ---------------------------------------------------------------------------
# Modulo D del PSS - Valutazione before-after (s10)
# ---------------------------------------------------------------------------
before_after:
  # Ampiezza delle finestre attorno alla data di attivazione (anni).
  n_anni_pre: 3
  n_anni_post: 2
  # Dati minimi perche' un intervento sia valutabile (mesi effettivi
  # dopo il troncamento sulla disponibilita' degli incidenti).
  # Con le date segnaposto 2025-01-01 il "dopo" non raggiunge la soglia
  # -> valutabile=False, motivo=post_insufficiente. Quando le date reali
  # arrivano nel CSV di override (s0d) la valutazione parte da sola.
  mesi_minimi_pre: 24
  mesi_minimi_post: 12

# ---------------------------------------------------------------------------
# Correzioni empiriche ai dati sorgente
# ---------------------------------------------------------------------------
correzioni:
  # Offset sistematico dei semafori rispetto alla rete TomTom (CRS metrico).
  # Calcolato come mediana dello scostamento su 200 semafori veicolari.
  offset_semafori_m:
    dx: 0.9
    dy: 6.4

# ---------------------------------------------------------------------------
# Riproducibilita'
# ---------------------------------------------------------------------------
random_seed: 42
